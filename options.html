<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Right-Click Clipboard Paste Options</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7fb;
        --panel: #ffffff;
        --text: #17202a;
        --muted: #5d6d7e;
        --border: #d7deea;
        --accent: #0e7490;
        --accent-strong: #155e75;
        --ok: #0f766e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(180deg, #eef4ff 0%, var(--bg) 42%, #eef6f4 100%);
        color: var(--text);
        font: 15px/1.5 "Segoe UI", "Noto Sans", sans-serif;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .panel {
        width: min(760px, 100%);
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        box-shadow: 0 8px 30px rgba(23, 32, 42, 0.07);
        padding: 22px;
      }

      h1 {
        font-size: 20px;
        margin: 0 0 6px;
      }

      .sub {
        margin: 0 0 18px;
        color: var(--muted);
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin: 6px 0 14px;
        padding: 12px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #fbfdff;
      }

      label {
        font-weight: 600;
      }

      textarea {
        width: 100%;
        min-height: 150px;
        resize: vertical;
        padding: 10px;
        border: 1px solid var(--border);
        border-radius: 9px;
        font: 13px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }

      .hint {
        color: var(--muted);
        margin: 8px 0 16px;
        font-size: 13px;
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      button {
        border: 0;
        border-radius: 9px;
        padding: 10px 14px;
        background: var(--accent);
        color: #fff;
        font-weight: 600;
        cursor: pointer;
      }

      button:hover {
        background: var(--accent-strong);
      }

      #status {
        color: var(--ok);
        font-weight: 600;
      }

      @media (max-width: 560px) {
        .panel {
          padding: 16px;
        }
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <h1>Right-Click Clipboard Paste</h1>
      <p class="sub">Control where automatic right-click paste is active.</p>

      <div class="row">
        <label for="enabled">Enable extension behavior</label>
        <input id="enabled" type="checkbox" />
      </div>

      <label for="blockedSites">Blocked sites (one hostname per line)</label>
      <textarea
        id="blockedSites"
        placeholder="bank.example.com
*.internal.example.com"
      ></textarea>
      <p class="hint">
        Rules can be plain hostnames (for example, example.com), wildcard subdomains (for example,
        *.example.com), or full URLs.
      </p>

      <div class="actions">
        <button id="save" type="button">Save</button>
        <span id="status" role="status" aria-live="polite"></span>
      </div>
    </main>

    <script src="options.js"></script>
  </body>
</html>
